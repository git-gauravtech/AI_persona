<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaurav Saklani · AI Persona</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.06);
    --text: #1a1917;
    --text2: #6b6a65;
    --text3: #9b9a95;
    --accent: #2a5cff;
    --accent-light: #eef1ff;
    --user-bubble: #1a1917;
    --user-text: #ffffff;
    --bot-bubble: #ffffff;
    --bot-text: #1a1917;
    --danger-bg: #fff0f0;
    --danger-text: #c0392b;
    --danger-border: #ffcccc;
    --success: #22c55e;
    --radius: 16px;
    --radius-sm: 8px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #242422;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.05);
      --text: #f0efe9;
      --text2: #b8b7b1;
      --text3: #7d7b75;
      --accent: #5b7fff;
      --accent-light: #1a1f3a;
      --user-bubble: #f0efe9;
      --user-text: #111110;
      --bot-bubble: #1c1c1a;
      --bot-text: #f0efe9;
      --danger-bg: #2a1515;
      --danger-text: #ff8080;
      --danger-border: #5a2020;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--user-bubble);
    color: var(--user-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-info p {
    font-size: 12px;
    color: var(--text3);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    margin-left: auto;
    flex-shrink: 0;
  }

  .reset-btn {
    font-family: var(--font);
    font-size: 12px;
    color: var(--text2);
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .reset-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-light);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar {
    width: 4px;
  }

  #messages::-webkit-scrollbar-track {
    background: transparent;
  }

  #messages::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }

  .msg-row {
    display: flex;
    gap: 10px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--text2);
  }

  .msg-row.user .msg-avatar {
    background: var(--user-bubble);
    color: var(--user-text);
    border-color: transparent;
  }

  .bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 40px);
    word-break: break-word;
    white-space: normal;
  }

  .msg-row.bot .bubble {
    background: var(--bot-bubble);
    color: var(--bot-text);
    border: 0.5px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg-row.user .bubble {
    background: var(--user-bubble);
    color: var(--user-text);
    border-top-right-radius: 4px;
  }

  .typing-bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing-bubble span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes bounce {
    0%, 60%, 100% {
      transform: translateY(0);
    }

    30% {
      transform: translateY(-5px);
    }
  }

  .suggestions {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .suggestion-btn {
    font-family: var(--font);
    font-size: 12px;
    color: var(--text2);
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  footer {
    padding: 12px 16px 16px;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 4px 0;
  }

  #user-input::placeholder {
    color: var(--text3);
  }

  #send-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover {
    opacity: 0.85;
  }

  #send-btn:active {
    transform: scale(0.94);
  }

  #send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #send-btn svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
  }

  .error-bubble {
    background: var(--danger-bg) !important;
    color: var(--danger-text) !important;
    border-color: var(--danger-border) !important;
    font-size: 13px !important;
  }

  @media (max-width: 640px) {
    header {
      padding: 12px 14px;
    }

    .reset-btn {
      display: none;
    }

    #messages {
      padding: 18px 12px;
    }

    .bubble {
      max-width: calc(100% - 34px);
      font-size: 13.5px;
    }

    .suggestion-btn {
      white-space: normal;
    }
  }
</style>
</head>

<body>

<header>
  <div class="avatar" id="header-avatar">GS</div>
  <div class="header-info">
    <h1 id="persona-name">Gaurav Saklani · AI Representative</h1>
    <p>AI Engineer Intern Candidate</p>
  </div>
  <div class="status-dot" title="Online"></div>
  <button class="reset-btn" id="reset-btn" title="Start a fresh chat">Reset</button>
</header>

<div id="messages">
  <!-- Welcome message injected by JS -->
</div>

<footer>
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Ask about Gaurav's background, projects, GitHub repos, or availability…"></textarea>
    <button id="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <p class="disclaimer">AI representative powered by RAG · Grounded in Gaurav's resume and GitHub data</p>
</footer>

<script src="/config.js"></script>

<script>
/*
  CONFIG

  Local:
  const API_URL = "http://localhost:8000/chat";

  After backend deployment:
  const API_URL = "https://your-backend-url.onrender.com/chat";
*/

const API_URL =
  window.APP_CONFIG?.API_URL || "http://localhost:8000/chat";

const PERSONA_NAME = "Gaurav Saklani";
const INITIALS = "GS";

const SUGGESTIONS = [
  "Why is Gaurav the right fit for this AI Engineer Intern role?",
  "Tell me about Gaurav's AI and backend projects",
  "What was Gaurav's role in his resume projects?",
  "Walk me through one GitHub repo in detail",
  "Did Gaurav build MicroMatch alone?",
  "Schedule an interview with Gaurav"
];

const WELCOME_MSG = `Hi! I'm ${PERSONA_NAME}'s AI representative. I can answer questions about Gaurav's background, resume, projects, GitHub repositories, and availability. I stay grounded in his resume and GitHub data, and I can also help schedule an interview.`;

// ── State ────────────────────────────────────────────────────────────────────
let history = [];
let isLoading = false;

let sessionId = localStorage.getItem("session_id");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("session_id", sessionId);
}

// ── DOM refs ─────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const resetBtn = document.getElementById("reset-btn");

document.getElementById("header-avatar").textContent = INITIALS;
document.getElementById("persona-name").textContent = `${PERSONA_NAME} · AI Representative`;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  messagesEl.innerHTML = "";
  history = [];
  appendBotMessage(WELCOME_MSG);
  appendSuggestions();
}

// ── Render helpers ───────────────────────────────────────────────────────────
function appendUserMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="msg-avatar">${INITIALS}</div>
    <div class="bubble">${escapeHtml(text)}</div>
  `;
  messagesEl.appendChild(row);
  scrollBottom();
}

function appendBotMessage(text, isError = false) {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="bubble${isError ? " error-bubble" : ""}">${formatText(text)}</div>
  `;
  messagesEl.appendChild(row);
  scrollBottom();
  return row;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typing-row";
  row.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="bubble typing-bubble">
      <span></span><span></span><span></span>
    </div>
  `;
  messagesEl.appendChild(row);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById("typing-row");
  if (el) el.remove();
}

function appendSuggestions() {
  const wrap = document.createElement("div");
  wrap.className = "suggestions";
  wrap.id = "suggestions";

  SUGGESTIONS.forEach(q => {
    const btn = document.createElement("button");
    btn.className = "suggestion-btn";
    btn.textContent = q;
    btn.onclick = () => {
      sendMessage(q);
      wrap.remove();
    };
    wrap.appendChild(btn);
  });

  messagesEl.appendChild(wrap);
  scrollBottom();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function formatText(text) {
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br>");
}

// ── Send message ─────────────────────────────────────────────────────────────
async function sendMessage(text) {
  text = text.trim();
  if (!text || isLoading) return;

  const sug = document.getElementById("suggestions");
  if (sug) sug.remove();

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  autoResize();

  appendUserMessage(text);
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text,
        history,
        session_id: sessionId
      })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const detail = typeof err.detail === "string"
        ? err.detail
        : JSON.stringify(err.detail || "Something went wrong.");
      appendBotMessage(`Error ${res.status}: ${detail}`, true);
    } else {
      const data = await res.json();
      appendBotMessage(data.reply || "I could not generate a response.");

      history.push({ role: "user", content: text });
      history.push({ role: "assistant", content: data.reply || "" });

      if (history.length > 20) {
        history = history.slice(-20);
      }
    }
  } catch (e) {
    removeTyping();
    appendBotMessage(`Could not reach the API at ${API_URL}. Make sure your backend is running.`, true);
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Input auto-resize ────────────────────────────────────────────────────────
function autoResize() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
}

inputEl.addEventListener("input", autoResize);

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

sendBtn.addEventListener("click", () => sendMessage(inputEl.value));

resetBtn.addEventListener("click", () => {
  localStorage.removeItem("session_id");
  sessionId = crypto.randomUUID();
  localStorage.setItem("session_id", sessionId);
  init();
});

init();
</script>
</body>
</html>
